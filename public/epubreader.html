<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic EPUB Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
    <style>
      /* Load Lucide icon font from unpkg */
      @font-face {
        font-family: 'LucideIcons';
        src: url(https://cdn.jsdelivr.net/npm/lucide-static@latest/font/Lucide.ttf) format('truetype');
      }
      .lucide {
        font-family: 'LucideIcons';
        font-size: 1.5rem; /* Icon size */
        line-height: 1;   /* Prevent extra spacing */
      }

      /* --- Futuristic Theme Styles --- */

      body {
        background-color: #0f172a; /* slate-900 */
        color: #cbd5e1; /* slate-300 */
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      }

      h1 {
        color: #67e8f9; /* cyan-400 */
        text-shadow: 0 0 5px rgba(103, 232, 249, 0.5);
      }

      #viewer {
        height: calc(100vh - 280px); /* Adjusted height for slider & location */
        overflow: hidden;
        position: relative;
        & iframe {
            background-color: #1e293b; /* slate-800 */
            border-radius: 0.5rem;
        }
      }
      #viewer-container {
        background-color: #1e293b; /* slate-800 */
        border: 1px solid #475569; /* slate-600 */
        box-shadow: 0 0 15px rgba(103, 232, 249, 0.1);
      }
       #placeholder {
           color: #94a3b8; /* slate-400 */
       }

      .file-input-button {
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        background-color: #1e293b; /* slate-800 */
        color: #67e8f9; /* cyan-400 */
        border: 1px solid #0891b2; /* cyan-600 */
        padding: 0.75rem 1.5rem;
        border-radius: 0.375rem; /* rounded-md */
        transition: background-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        font-weight: 600;
      }
      .file-input-button:hover {
        background-color: #334155; /* slate-700 */
        box-shadow: 0 0 8px rgba(103, 232, 249, 0.4);
      }
      #file-input { display: none; }

      .nav-button {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        background-color: #1e293b; /* slate-800 */
        color: #67e8f9; /* cyan-400 */
        border: 1px solid #0891b2; /* cyan-600 */
        border-radius: 9999px; /* rounded-full */
        transition: background-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
      }
      .nav-button:hover:not(:disabled) {
        background-color: #334155; /* slate-700 */
        box-shadow: 0 0 8px rgba(103, 232, 249, 0.4);
      }
      .nav-button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        border-color: #475569; /* slate-600 */
        color: #94a3b8; /* slate-400 */
      }
      .nav-button .lucide { font-size: 1.75rem; }

      #loading-message {
        display: none; position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%); z-index: 10;
        color: #e2e8f0; /* slate-200 */
        background-color: rgba(15, 23, 42, 0.8); /* slate-900 */
        padding: 1rem 1.5rem; border-radius: 0.5rem;
        border: 1px solid #475569; /* slate-600 */
      }
      #error-message {
        display: none; position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%); z-index: 10;
        background-color: rgba(127, 29, 29, 0.9); /* dark red */
        color: #fecaca; /* red-200 */
        padding: 1rem 1.5rem; border-radius: 0.5rem;
        border: 1px solid #ef4444; /* red-500 */
        font-weight: 600;
      }

      /* --- Slider Styles --- */
      #page-slider-container {
        width: 80%;
        max-width: 600px;
        margin-top: 1rem;
      }
      #page-slider {
        -webkit-appearance: none; appearance: none;
        width: 100%; height: 8px; background: #334155; /* slate-700 */
        border-radius: 5px; outline: none; opacity: 0.7; transition: opacity .2s; cursor: pointer;
      }
      #page-slider:hover { opacity: 1; }
      #page-slider:disabled { opacity: 0.3; cursor: not-allowed; }
      #page-slider::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 20px; height: 20px; background: #67e8f9; /* cyan-400 */
        border-radius: 50%; border: 1px solid #0891b2; /* cyan-600 */
        cursor: pointer; box-shadow: 0 0 5px rgba(103, 232, 249, 0.5);
      }
      #page-slider::-moz-range-thumb {
        width: 18px; height: 18px; background: #67e8f9; /* cyan-400 */
        border-radius: 50%; border: 1px solid #0891b2; /* cyan-600 */
        cursor: pointer; box-shadow: 0 0 5px rgba(103, 232, 249, 0.5);
      }
      #page-slider::-moz-range-track {
         width: 100%; height: 8px; cursor: pointer; background: #334155; /* slate-700 */
         border-radius: 5px;
      }

      /* --- Location Display Styles --- */
      #location-display {
          color: #94a3b8; /* slate-400 */
          min-height: 1.5em; /* Prevent layout shift */
      }

    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-6">

    <h1 class="text-4xl font-bold mb-8 tracking-wider">EPUB READER INTERFACE</h1>

    <div class="mb-8 w-full max-w-5xl flex justify-center">
        <label for="file-input" class="file-input-button">
            <span class="lucide">&#xe4dd;</span>
            <span>LOAD EPUB DATUM</span>
        </label>
        <input type="file" id="file-input" accept=".epub">
    </div>

    <div id="viewer-container" class="w-full max-w-5xl rounded-lg shadow-lg relative mb-4">
        <div id="loading-message" class="font-semibold">Processing...</div>
        <div id="error-message" class="font-semibold"></div>
        <div id="viewer">
            <p id="placeholder" class="text-lg text-center p-12">Awaiting EPUB file selection...</p>
        </div>
    </div>

    <div id="page-slider-container" class="hidden">
         <input type="range" id="page-slider" min="0" max="100" value="0" step="1" disabled>
    </div>

    <div id="location-display" class="mt-2 text-center text-sm hidden">Location -- / --</div>

    <div id="navigation" class="flex justify-center gap-6 w-full max-w-5xl mt-2 hidden">
            <button id="prev" class="nav-button" aria-label="Previous Page">
            <span class="lucide">&#xe108;</span>
        </button>
        <button id="next" class="nav-button" aria-label="Next Page">
            <span class="lucide">&#xe109;</span>
        </button>
    </div>

    <script>
        // Get references to DOM elements
        const fileInput = document.getElementById('file-input');
        const viewerElement = document.getElementById('viewer');
        const placeholder = document.getElementById('placeholder');
        const navigationElement = document.getElementById('navigation');
        const prevButton = document.getElementById('prev');
        const nextButton = document.getElementById('next');
        const loadingMessage = document.getElementById('loading-message');
        const errorMessageElement = document.getElementById('error-message');
        const pageSliderContainer = document.getElementById('page-slider-container');
        const pageSlider = document.getElementById('page-slider');
        const locationDisplay = document.getElementById('location-display'); // Location display element

        let book = null;
        let rendition = null;
        let isSliderUpdating = false;
        let totalLocations = 0; // Store total locations

        // Function to show loading message
        function showLoading() {
            loadingMessage.style.display = 'block';
            errorMessageElement.style.display = 'none';
            placeholder.style.display = 'none';
            viewerElement.innerHTML = '';
            navigationElement.classList.add('hidden');
            pageSliderContainer.classList.add('hidden');
            locationDisplay.classList.add('hidden'); // Hide location display
            locationDisplay.textContent = 'Location -- / --'; // Reset text
            pageSlider.disabled = true;
            totalLocations = 0; // Reset total locations
        }

        // Function to hide loading message
        function hideLoading() {
            loadingMessage.style.display = 'none';
        }

         // Function to show error message
        function showError(message) {
            errorMessageElement.textContent = `Error: ${message}`;
            errorMessageElement.style.display = 'block';
            hideLoading();
            placeholder.style.display = 'block';
            placeholder.textContent = 'EPUB Load Failure. Select valid datum.';
            navigationElement.classList.add('hidden');
            pageSliderContainer.classList.add('hidden');
            locationDisplay.classList.add('hidden'); // Hide location display
            locationDisplay.textContent = 'Location -- / --'; // Reset text
            pageSlider.disabled = true;
            totalLocations = 0; // Reset total locations
            console.error("EPUB Loading Error:", message);
            if (book) { book.destroy(); book = null; }
            if (rendition) { rendition.destroy(); rendition = null; }
        }

        // Function to update navigation button, slider, and location display states
        function updateNavControls() {
            // Ensure book, rendition, location, and locations are ready
            if (!book || !rendition || !rendition.location || !book.locations || totalLocations === 0) {
                prevButton.disabled = true;
                nextButton.disabled = true;
                pageSlider.disabled = true;
                if (!navigationElement.classList.contains('hidden')) {
                     navigationElement.classList.add('hidden');
                     pageSliderContainer.classList.add('hidden');
                     locationDisplay.classList.add('hidden'); // Hide location display if controls are hidden
                }
                return;
            }

            // Show controls now that book is ready
             navigationElement.classList.remove('hidden');
             pageSliderContainer.classList.remove('hidden');
             locationDisplay.classList.remove('hidden'); // Show location display
             pageSlider.disabled = false;

            const currentLocation = rendition.location.start.cfi;
            let currentPercentage = 0;

            // Update Buttons & Calculate Percentage
            try {
                const startCfi = book.locations.cfiFromPercentage(0);
                prevButton.disabled = (currentLocation === startCfi);
            } catch (err) {
                console.error("Error getting start CFI:", err);
                prevButton.disabled = true;
            }
            try {
                currentPercentage = book.locations.percentageFromCfi(currentLocation);
                nextButton.disabled = (currentPercentage >= 0.999);
            } catch (err) {
                console.error("Error getting percentage from CFI:", err);
                nextButton.disabled = true;
            }

            // Update Slider Position (if not currently being dragged)
            if (!isSliderUpdating) {
                pageSlider.value = Math.round(currentPercentage * 100);
            }

            // Update Location Display
            const currentLocationIndex = Math.round(currentPercentage * (totalLocations - 1));
            locationDisplay.textContent = `Location ${currentLocationIndex + 1} / ${totalLocations}`;

        }


        // --- Event Listeners ---

        // Listen for file selection
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            if (file.type !== 'application/epub+zip' && !file.name.toLowerCase().endsWith('.epub')) {
                 showError('Invalid File Type. Please select EPUB datum.');
                 fileInput.value = '';
                 return;
            }

            showLoading(); // Resets location display and total

            const reader = new FileReader();

            reader.onload = function(e) {
                const bookData = e.target.result;

                if (book) { book.destroy(); book = null; }
                if (rendition) { rendition.destroy(); rendition = null; }

                try {
                    if (typeof ePub === 'undefined') { showError('Core EPUB library failed to initialize.'); return; }
                    if (typeof JSZip === 'undefined') { showError('Data decompression library failed to initialize.'); return; }

                    book = ePub(bookData);
                    rendition = book.renderTo(viewerElement, { width: "100%", height: "100%", flow: "paginated", spread: "auto" });

                    // Define Theme
                    rendition.themes.register("futuristic-content", {
                        "body": { "color": "white !important", "background-color": "#1e293b !important" },
                        "p, li, h1, h2, h3, h4, h5, h6, span, div, a": { "color": "white !important" },
                        "img": { "display": "block !important", "width": "100% !important", "max-width": "100% !important", "height": "auto !important", "margin-left": "0 !important", "margin-right": "0 !important", "margin-top": "1em !important", "margin-bottom": "1em !important", "padding": "0 !important", "object-fit": "contain" }
                    });

                    // Display Book, Apply Theme, Generate Locations
                    rendition.display().then(() => {
                        console.log("Book displayed");
                        rendition.themes.select("futuristic-content");
                        console.log("Applied futuristic-content theme");
                        hideLoading();
                        placeholder.style.display = 'none';
                        console.log("Generating locations...");
                        return book.locations.generate(1650);
                    }).then(() => {
                        totalLocations = book.locations.length(); // Store total locations
                        console.log("Locations generated:", totalLocations);
                        pageSlider.value = 0; // Start slider at 0
                        locationDisplay.textContent = `Location 1 / ${totalLocations}`; // Set initial display
                        updateNavControls(); // Update all controls visibility/state
                    }).catch((err) => {
                        showError(`EPUB Rendering Failed: ${err.message || err}`);
                        console.error("EPUB Rendering/Location Error:", err);
                    });

                    // Key press navigation
                    rendition.on("keyup", function(event){
                        if(event.keyCode == 37 && !prevButton.disabled) rendition.prev();
                        if(event.keyCode == 39 && !nextButton.disabled) rendition.next();
                    });

                     // Update navigation controls on relocation
                     rendition.on('relocated', function(location){
                        console.log("Relocated to:", location.start.cfi);
                        updateNavControls(); // Updates buttons, slider, and location display
                     });

                     // Handle window resize
                     let resizeTimeout;
                     window.addEventListener('resize', () => {
                        clearTimeout(resizeTimeout);
                        resizeTimeout = setTimeout(() => {
                            if (rendition) {
                                rendition.resize();
                                updateNavControls();
                            }
                        }, 250);
                     });

                 } catch (err) {
                    showError(`EPUB Initialization Failed: ${err.message || err}`);
                    console.error("EPUB Initialization Error:", err);
                 }
            };

            reader.onerror = function(e) {
                showError('File Read Error. Could not access datum.');
                console.error("File Reading Error:", e);
            };

            reader.readAsArrayBuffer(file);
        });

        // --- Slider Input Event Listener ---
        pageSlider.addEventListener('input', () => {
            if (!book || !book.locations || !rendition || totalLocations === 0) return;

            isSliderUpdating = true;
            const percentage = parseInt(pageSlider.value) / 100;

            // Update location display immediately based on slider value
            const currentLocationIndex = Math.round(percentage * (totalLocations - 1));
            locationDisplay.textContent = `Location ${currentLocationIndex + 1} / ${totalLocations}`;

            try {
                const cfi = book.locations.cfiFromPercentage(percentage);
                rendition.display(cfi).then(() => {
                    setTimeout(() => { isSliderUpdating = false; }, 100);
                });
                // Update buttons immediately
                prevButton.disabled = (percentage <= 0.001);
                nextButton.disabled = (percentage >= 0.999);
            } catch (err) {
                console.error("Error navigating with slider:", err);
                 isSliderUpdating = false;
            }
        });


        // Navigation button clicks
        prevButton.addEventListener('click', () => {
            if (rendition && !prevButton.disabled) {
                rendition.prev();
            }
        });

        nextButton.addEventListener('click', () => {
            if (rendition && !nextButton.disabled) {
                rendition.next();
            }
        });

        // Initial navigation state (all disabled)
        updateNavControls();

    </script>

</body>
</html>
