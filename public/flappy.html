<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #87CEEB; /* Sky blue background */
            margin: 0;
            font-family: 'Press Start 2P', cursive;
            color: white;
            text-shadow: 2px 2px 0 #000; /* Simple text shadow */
            flex-direction: column; /* Stack elements vertically */
            overflow: hidden; /* Prevent scrollbars */
        }

        #gameContainer {
            position: relative; /* Needed for absolute positioning of messages */
            border: 5px solid #333;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.5);
            background-color: #71C5CF; /* Slightly different background for canvas */
            border-radius: 10px; /* Rounded corners for the container */
            overflow: hidden; /* Keep elements inside */
            width: 320px; /* Standard Flappy Bird width */
            height: 480px; /* Standard Flappy Bird height */
        }

        canvas {
            display: block; /* Remove extra space below canvas */
            background-image: url('https://placehold.co/320x480/71C5CF/FFFFFF?text=Flappy+Bird'); /* Placeholder background */
            background-size: cover; /* Cover the canvas area */
            /* Ensure crisp pixels */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 100%;
            height: 100%;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2em;
            z-index: 10;
        }

        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;
            z-index: 20;
            display: none; /* Hidden by default */
            border: 3px solid white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        #messageBox h2 {
            margin-top: 0;
            font-size: 1.5em;
            color: #FFD700; /* Gold color for title */
        }

        #messageBox p {
            margin-bottom: 20px;
        }

        #restartButton {
            padding: 10px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1em;
            color: #333;
            background-color: #FFD700; /* Gold */
            border: 3px solid #DAA520; /* Darker Gold */
            border-radius: 8px;
            cursor: pointer;
            text-shadow: 1px 1px 0 #FFF;
            box-shadow: 2px 2px 0 #A0522D; /* Brown shadow */
            transition: all 0.1s ease;
        }

        #restartButton:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="320" height="480"></canvas>
        <div id="score">0</div>
        <div id="messageBox">
            <h2>Game Over!</h2>
            <p id="finalScore">Your Score: 0</p>
            <button id="restartButton">Restart</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const messageBox = document.getElementById('messageBox');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');

        // --- Disable image smoothing for pixelated effect ---
        ctx.imageSmoothingEnabled = false;

        // --- Game Constants ---
        const BIRD_X = 50;
        const PIXEL_SIZE = 6;
        const BIRD_GRID_WIDTH = 4;
        const BIRD_GRID_HEIGHT = 4;
        const BIRD_WIDTH = BIRD_GRID_WIDTH * PIXEL_SIZE;
        const BIRD_HEIGHT = BIRD_GRID_HEIGHT * PIXEL_SIZE;

        const GRAVITY = 0.18;
        const FLAP_STRENGTH = -5; // Normal flap strength for click/space
        const TOUCH_FLAP_STRENGTH = FLAP_STRENGTH / 2; // Weaker flap for touch (-2.5) <--- ADDED
        const PIPE_WIDTH = 52;
        const PIPE_GAP = 120;
        const PIPE_SPEED = 2;
        const PIPE_SPAWN_RATE = 160;

        // --- Bird Pixel Data ---
        const birdPixels = [
          [0, 1, 1, 0],
          [1, 1, 3, 2],
          [1, 1, 1, 0],
          [0, 1, 0, 0]
        ];
        const birdColors = {
            1: '#FFD700', // Yellow
            2: '#FFA500', // Orange
            3: '#000000'  // Black
        };

        // --- Game Variables ---
        let birdY;
        let birdVelocity;
        let pipes;
        let score;
        let frameCount;
        let gameState;


        // --- Bird Drawing (Pixel by Pixel) ---
        function drawBird() {
            ctx.save();
            ctx.translate(BIRD_X + BIRD_WIDTH / 2, birdY + BIRD_HEIGHT / 2);
            let angle = Math.max(-20, Math.min(90, birdVelocity * 6));
            ctx.rotate(angle * Math.PI / 180);
            const startX = -BIRD_WIDTH / 2;
            const startY = -BIRD_HEIGHT / 2;
            for (let row = 0; row < BIRD_GRID_HEIGHT; row++) {
                for (let col = 0; col < BIRD_GRID_WIDTH; col++) {
                    const pixelValue = birdPixels[row][col];
                    if (pixelValue > 0) {
                        ctx.fillStyle = birdColors[pixelValue];
                        ctx.fillRect(
                            startX + col * PIXEL_SIZE,
                            startY + row * PIXEL_SIZE,
                            PIXEL_SIZE,
                            PIXEL_SIZE
                        );
                    }
                }
            }
            ctx.restore();
        }


        // --- Pipe Drawing ---
        function drawPipes() {
            ctx.fillStyle = '#008000';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            pipes.forEach(pipe => {
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
                ctx.strokeRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
                const bottomPipeY = pipe.topHeight + PIPE_GAP;
                const bottomPipeHeight = canvas.height - bottomPipeY;
                ctx.fillRect(pipe.x, bottomPipeY, PIPE_WIDTH, bottomPipeHeight);
                ctx.strokeRect(pipe.x, bottomPipeY, PIPE_WIDTH, bottomPipeHeight);
                const capHeight = 20;
                ctx.fillRect(pipe.x - 5, pipe.topHeight - capHeight, PIPE_WIDTH + 10, capHeight);
                ctx.strokeRect(pipe.x - 5, pipe.topHeight - capHeight, PIPE_WIDTH + 10, capHeight);
                ctx.fillRect(pipe.x - 5, bottomPipeY, PIPE_WIDTH + 10, capHeight);
                ctx.strokeRect(pipe.x - 5, bottomPipeY, PIPE_WIDTH + 10, capHeight);
            });
        }

        // --- Game Logic ---
        function update() {
            if (gameState !== 'playing') return;
            birdVelocity += GRAVITY;
            birdY += birdVelocity;
            if (birdY + BIRD_HEIGHT > canvas.height || birdY < 0) {
                gameOver();
                return;
            }
            frameCount++;
            if (frameCount % PIPE_SPAWN_RATE === 0) {
                const minHeight = 50;
                const maxHeight = canvas.height - PIPE_GAP - minHeight;
                const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
                pipes.push({ x: canvas.width, topHeight: topHeight, scored: false });
            }
            let scoredThisFrame = false;
            pipes.forEach(pipe => {
                pipe.x -= PIPE_SPEED;
                const birdRight = BIRD_X + BIRD_WIDTH;
                const birdBottom = birdY + BIRD_HEIGHT;
                const pipeRight = pipe.x + PIPE_WIDTH;
                if (birdRight > pipe.x && BIRD_X < pipeRight) {
                    const bottomPipeY = pipe.topHeight + PIPE_GAP;
                    if (birdY < pipe.topHeight || birdBottom > bottomPipeY) {
                        gameOver();
                        return;
                    }
                }
                if (!pipe.scored && pipe.x + PIPE_WIDTH < BIRD_X) {
                    if (!scoredThisFrame) {
                       score++;
                       scoreDisplay.textContent = score;
                       scoredThisFrame = true;
                    }
                    pipe.scored = true;
                }
            });
            pipes = pipes.filter(pipe => pipe.x + PIPE_WIDTH > 0);
        }

        // --- Drawing ---
        function draw() {
            ctx.fillStyle = '#71C5CF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawPipes();
            drawBird();
            if (gameState === 'start') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, canvas.height / 2 - 30, canvas.width, 60);
                ctx.fillStyle = 'white';
                ctx.font = "16px 'Press Start 2P'";
                ctx.textAlign = 'center';
                ctx.fillText('Click or Press Space', canvas.width / 2, canvas.height / 2 - 5);
                 ctx.fillText('to Flap!', canvas.width / 2, canvas.height / 2 + 15);
            }
        }

        // --- Game Loop ---
        let animationFrameId = null;
        function gameLoop() {
            update();
            draw();
            if (gameState !== 'gameOver') {
               animationFrameId = requestAnimationFrame(gameLoop);
            }
        }

        // --- Game State Functions ---
        function init() {
            birdY = canvas.height / 2 - BIRD_HEIGHT / 2;
            birdVelocity = 0;
            pipes = [];
            score = 0;
            frameCount = 0;
            gameState = 'start';
            scoreDisplay.textContent = score;
            messageBox.style.display = 'none';
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            ctx.imageSmoothingEnabled = false;
            draw();
        }

        function startGame() {
            if (gameState === 'start') {
                gameState = 'playing';
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                }
                gameLoop();
            }
        }

        function gameOver() {
            gameState = 'gameOver';
            finalScoreDisplay.textContent = `Your Score: ${score}`;
            messageBox.style.display = 'block';
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        // --- Event Listeners ---
        // Modified handleInput to accept strength parameter
        function handleInput(strength = FLAP_STRENGTH) { // Default to full strength <--- MODIFIED HERE
            if (gameState === 'playing') {
                birdVelocity = strength; // Use provided strength <--- MODIFIED HERE
            } else if (gameState === 'start') {
                startGame();
                birdVelocity = strength; // Use provided strength <--- MODIFIED HERE
            }
        }

        // Click uses default (full) strength
        window.addEventListener('click', () => handleInput()); // <--- MODIFIED HERE (calls handleInput without args)

        // Keydown uses default (full) strength
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                handleInput(); // <--- MODIFIED HERE (calls handleInput without args)
                e.preventDefault();
            }
        });

        // Touchstart uses specific TOUCH_FLAP_STRENGTH (half)
        window.addEventListener('touchstart', (e) => {
             handleInput(TOUCH_FLAP_STRENGTH); // Pass the weaker strength <--- MODIFIED HERE
             e.preventDefault();
        });

        restartButton.addEventListener('click', () => {
            init();
        });

        // --- Initial Setup ---
        document.fonts.load("10px 'Press Start 2P'").then(() => {
            console.log('Font loaded, initializing game.');
            init();
        }).catch(err => {
            console.error('Font loading error:', err);
            init();
        });

    </script>
</body>
</html>
